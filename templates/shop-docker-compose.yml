services:
  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - {SHOP_DIR}:/app
    ports:
      - "{PORT}:3000"
    environment:
      - NEXT_PUBLIC_BASE_PATH=/{SLUG}
      - BASE_PATH=/{SLUG}
    env_file:
      - .env
    command: >
      sh -c "
        ([ -d node_modules ] || npm install) &&
        SRC_VER=$$(node -e \"console.log(require('./package.json').version)\") &&
        BUILT_VER=$$(cat .next/DEPLOYED_VERSION 2>/dev/null || echo '') &&
        ([ \"$$SRC_VER\" = \"$$BUILT_VER\" ] || (npm run build && echo $$SRC_VER > .next/DEPLOYED_VERSION)) &&
        npm start
      "
    restart: unless-stopped
