  <!-- Right engine nozzle -->
  <ellipse cx="53.5" cy="79" rx="3.5" ry="4.5" fill="#178F87"/>
  <ellipse cx="53.5" cy="82" rx="2" ry="2" fill="#39C5BB" opacity="0.6"/>
  <!-- Cockpit window -->
