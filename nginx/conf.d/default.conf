# Main server — serves frontend and includes path-based shop locations
server {
    listen 80 default_server;
    server_name _;

    # Include path-based shop location blocks (generated by backend)
    include /etc/nginx/conf.d/shops-locations.inc;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
