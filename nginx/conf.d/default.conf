# Main server — serves frontend, proxies API, and includes path-based shop locations
server {
    listen 80 default_server;
    server_name _;

    # Include path-based shop location blocks (generated by backend)
    include /etc/nginx/conf.d/shops-locations.inc;

    # Backend API — trailing slash required so /api/foo doesn't get stripped
    location /api/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header CDN-Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
